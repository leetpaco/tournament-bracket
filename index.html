<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tournament Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'League Spartan', sans-serif;
}
#bracket {
    position: relative;
    width: 1920px;
    height: 1080px;
}
svg#connectors {
    position: absolute;
    top: 0; left: 0;
    width: 1920px;
    height: 1080px;
    pointer-events: none;
}
.column {
    position: absolute;
    top: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.column-title {
    font-size: 26px;
    font-weight: 900;
    color: #ffffff;
    text-transform: uppercase;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    border-bottom: 3px solid #00ff66;
    padding-bottom: 6px;
    margin-bottom: 6px;
    display: inline-block;
    margin-top: 160px;
}
.match {
    background: rgba(0,0,0,0.85);
    padding: 12px 16px;
    border-radius: 10px;
    text-align: center;
    color: white;
    font-weight: 900;
    white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.08);
}
.round-title {
    font-size: 16px;
    color: #00ff66;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    margin-bottom: 4px;
    text-transform: uppercase;
}
.vs {
    font-size: 14px;
    font-weight: 900;
    color: #ffffff;
    opacity: 0.5;
    margin: 2px 0;
}
.team {
    font-size: 26px;
    font-weight: 900;
}
.team.winner { color: #ffcc00; }
.team.loser {
    color: #888;
    text-decoration: line-through;
}
</style>
</head>
<body>
<div id="bracket">
    <svg id="connectors"></svg>
</div>

<script>
const SHEET_ID   = "1Su3YeZyI7X4FR8laKP6wVz7QqAViQotHN--O9Q13_AA";
const SHEET_NAME = "Sheet1";

const COLUMN_TITLES = {
    1: "Match Play",
    2: "Semi Finals",
    3: "Final"
};

const W = 1920, H = 1080;
const MATCH_W = 340;
const MATCH_H = 110;
const COL_PAD_TOP = 160;
const CONNECTOR_COLOR = "#00ff66";
const CONNECTOR_WIDTH = 2;

function parseCSV(text) {
    return text.split("\n").map(line => {
        const cols = [];
        let current = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const ch = line[i];
            if (ch === '"') { inQuotes = !inQuotes; }
            else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
            else { current += ch; }
        }
        cols.push(current.trim());
        return cols;
    }).filter(row => {
        const first = row[0].replace(/"/g, '').trim();
        return row.length >= 4 && first !== '' && !isNaN(parseInt(first));
    });
}

function buildMatchEl(match) {
    const winnerTrim = match.winner.trim();
    const t1 = match.team1, t2 = match.team2;
    const t1c = winnerTrim && winnerTrim === t1 ? 'winner' : (winnerTrim ? 'loser' : '');
    const t2c = winnerTrim && winnerTrim === t2 ? 'winner' : (winnerTrim ? 'loser' : '');
    const el = document.createElement("div");
    el.className = "match";
    el.innerHTML = `
        <div class="round-title">${match.round}</div>
        <div class="team ${t1c}">${t1}</div>
        <div class="vs">VS</div>
        <div class="team ${t2c}">${t2}</div>
    `;
    return el;
}

async function updateBracket() {
    try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
        const response = await fetch(url);
        const text = await response.text();
        const lines = parseCSV(text);

        const columns = {};
        const allMatches = [];
        lines.forEach(parts => {
            const clean = parts.map(p => p.replace(/^"+|"+$/g, '').trim());
            const col = parseInt(clean[0]);
            const round = clean[1] || '', team1 = clean[2] || '', team2 = clean[3] || '', winner = clean[4] || '';
            const loser = winner ? (winner === team1 ? team2 : team1) : '';
            allMatches.push({ col, round, team1, team2, winner, loser });
            if (!columns[col]) columns[col] = [];
            columns[col].push(allMatches[allMatches.length - 1]);
        });

        const winnerMap = {}, loserMap = {};
        allMatches.forEach(m => {
            if (m.winner) { winnerMap[m.round] = m.winner; loserMap[m.round] = m.loser; }
        });

        function resolveShorthand(key) {
            const m = key.match(/^M(\d+)$/i); if (m) return `Round ${m[1]}`;
            const r = key.match(/^R(\d+)$/i); if (r) return `Round ${r[1]}`;
            const qf = key.match(/^QF(\d+)$/i); if (qf) return `Quarter Final ${qf[1]}`;
            const sf = key.match(/^SF(\d+)$/i); if (sf) return `Semi Final ${sf[1]}`;
            return null;
        }
        function resolve(name) {
            const wm = name.match(/Winner of (.+)/i);
            if (wm) { const k = wm[1].trim(); if (winnerMap[k]) return winnerMap[k]; const s = resolveShorthand(k); if (s && winnerMap[s]) return winnerMap[s]; }
            const lm = name.match(/Loser of (.+)/i);
            if (lm) { const k = lm[1].trim(); if (loserMap[k]) return loserMap[k]; const s = resolveShorthand(k); if (s && loserMap[s]) return loserMap[s]; }
            return name;
        }
        allMatches.forEach(m => { m.team1 = resolve(m.team1); m.team2 = resolve(m.team2); });

        const bracket = document.getElementById("bracket");
        const svg = document.getElementById("connectors");
        Array.from(bracket.children).forEach(c => { if (c !== svg) c.remove(); });
        svg.innerHTML = "";

        const colKeys = Object.keys(columns).map(Number).sort((a, b) => a - b);
        const numCols = colKeys.length;
        const colWidth = W / numCols;
        const matchPositions = {};

        colKeys.forEach((colNum, ci) => {
            const matches = columns[colNum];
            const numMatches = matches.length;
            const colX = ci * colWidth;

            const colEl = document.createElement("div");
            colEl.className = "column";
            colEl.style.left = colX + "px";
            colEl.style.width = colWidth + "px";
            colEl.style.height = H + "px";
            colEl.style.justifyContent = "flex-start";

            const titleEl = document.createElement("div");
            titleEl.className = "column-title";
            titleEl.innerText = COLUMN_TITLES[colNum] || `Round ${colNum}`;
            colEl.appendChild(titleEl);

            const GAP = 20;
            const totalMatchH = numMatches * MATCH_H + (numMatches - 1) * GAP;
            const startY = COL_PAD_TOP + (H - COL_PAD_TOP - totalMatchH) / 2;

            matches.forEach((match, mi) => {
                const matchEl = buildMatchEl(match);
                matchEl.style.width = MATCH_W + "px";
                matchEl.style.position = "absolute";

                const matchY = startY + mi * (MATCH_H + GAP);
                const matchX = colX + (colWidth - MATCH_W) / 2;
                matchEl.style.top = matchY + "px";
                matchEl.style.left = (colWidth - MATCH_W) / 2 + "px";

                colEl.appendChild(matchEl);

                const centerY = matchY + MATCH_H / 2;
                const rightX = matchX + MATCH_W;
                matchPositions[match.round] = { x: matchX, y: centerY, rightX };
            });

            bracket.appendChild(colEl);
        });

        const rawMatches = [];
        lines.forEach(parts => {
            const clean = parts.map(p => p.replace(/^"+|"+$/g, '').trim());
            rawMatches.push({ col: parseInt(clean[0]), round: clean[1] || '', team1Raw: clean[2] || '', team2Raw: clean[3] || '' });
        });

        rawMatches.forEach(m => {
            if (m.col < 2) return;
            const destPos = matchPositions[m.round];
            if (!destPos) return;

            [m.team1Raw, m.team2Raw].forEach(teamRaw => {
                const wm = teamRaw.match(/Winner of (.+)/i);
                if (!wm) return;
                let sourceRound = wm[1].trim();
                const short = resolveShorthand(sourceRound);
                if (short) sourceRound = short;
                const srcPos = matchPositions[sourceRound];
                if (!srcPos) return;

                const x1 = srcPos.rightX;
                const y1 = srcPos.y;
                const x2 = destPos.x;
                const y2 = destPos.y;
                const midX = (x1 + x2) / 2;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${x1} ${y1} H ${midX} V ${y2} H ${x2}`);
                path.setAttribute("stroke", CONNECTOR_COLOR);
                path.setAttribute("stroke-width", CONNECTOR_WIDTH);
                path.setAttribute("fill", "none");
                path.setAttribute("opacity", "0.6");
                svg.appendChild(path);
            });
        });

    } catch (err) {
        console.error("Failed to load bracket data:", err);
    }
}

setInterval(updateBracket, 500);
updateBracket();
</script>
</body>
</html>
