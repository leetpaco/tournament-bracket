<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tournament Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
html, body {
    margin: 0;
    padding: 0;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'League Spartan', sans-serif;
}
.bracket {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: flex-start;
    width: 1920px;
    height: 1080px;
    padding: 30px 40px;
    gap: 0;
}
.column {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    height: 100%;
    gap: 16px;
    padding-top: 10px;
}
.column-title {
    font-size: 26px;
    font-weight: 900;
    color: #ffffff;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    border-bottom: 3px solid #00ff66;
    padding-bottom: 6px;
    width: 100%;
    margin-bottom: 6px;
}
.round-title {
    font-size: 18px;
    color: #00ff66;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
    margin-bottom: 4px;
    text-transform: uppercase;
    text-align: center;
}
.match {
    position: relative;
    width: 260px;
    background: rgba(0,0,0,0.85);
    padding: 12px 16px;
    border-radius: 10px;
    text-align: center;
    color: white;
    font-weight: 900;
}
.vs {
    font-size: 16px;
    font-weight: 900;
    color: #ffffff;
    opacity: 0.5;
    margin: 2px 0;
}
.team {
    font-size: 22px;
    font-weight: 900;
}
.team.winner { color: #ffcc00; }
.team.loser {
    color: #cccccc;
    text-decoration: line-through;
}
</style>
</head>
<body>

<div class="bracket" id="bracket-container"></div>

<script>
// ============================================================
//  GOOGLE SHEET CONFIG
//  Sheet must be published: File → Share → Publish to web
//  → Select your sheet tab → CSV format → Publish
// ============================================================
const SHEET_ID   = "1Su3YeZyI7X4FR8laKP6wVz7QqAViQotHN--O9Q13_AA";
const SHEET_NAME = "Sheet1"; // Change if your tab has a different name
// ============================================================

const COLUMN_TITLES = {
    1: "Match Play",
    2: "Second Chance Match",
    3: "Quarter Finals",
    4: "Finals"
};

async function updateBracket() {
    try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
        const response = await fetch(url);
        const text = await response.text();

        // Parse CSV (handles quoted fields)
        const lines = text.split("\n").map(line => {
            const cols = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') { inQuotes = !inQuotes; }
                else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
                else { current += ch; }
            }
            cols.push(current.trim());
            return cols;
        }).filter(row => row.length >= 4 && row[0] !== '' && !isNaN(parseInt(row[0])));

        const columns = {};
        const allMatches = [];

        lines.forEach((parts) => {
            const col    = parseInt(parts[0]);
            const round  = parts[1] || '';
            const team1  = parts[2] || '';
            const team2  = parts[3] || '';
            const winner = parts[4] ? parts[4] : '';
            const loser  = winner ? (winner === team1 ? team2 : team1) : '';
            allMatches.push({ col, round, team1, team2, winner, loser });
            if (!columns[col]) columns[col] = [];
            columns[col].push(allMatches[allMatches.length - 1]);
        });

        const winnerMap = {};
        const loserMap  = {};
        allMatches.forEach(m => {
            if (m.winner) {
                winnerMap[m.round] = m.winner;
                loserMap[m.round]  = m.loser;
            }
        });

        function resolveShorthand(key) {
            const mMatch  = key.match(/^M(\d+)$/i);
            if (mMatch)  return `Round ${mMatch[1]}`;
            const rMatch  = key.match(/^R(\d+)$/i);
            if (rMatch)  return `Round ${rMatch[1]}`;
            const qfMatch = key.match(/^QF(\d+)$/i);
            if (qfMatch) return `Quarter Final ${qfMatch[1]}`;
            const sfMatch = key.match(/^SF(\d+)$/i);
            if (sfMatch) return `Semi Final ${sfMatch[1]}`;
            return null;
        }

        function resolve(name) {
            const winnerMatch = name.match(/Winner of (.+)/i);
            if (winnerMatch) {
                const key = winnerMatch[1].trim();
                if (winnerMap[key]) return winnerMap[key];
                const resolved = resolveShorthand(key);
                if (resolved && winnerMap[resolved]) return winnerMap[resolved];
            }
            const loserMatch = name.match(/Loser of (.+)/i);
            if (loserMatch) {
                const key = loserMatch[1].trim();
                if (loserMap[key]) return loserMap[key];
                const resolved = resolveShorthand(key);
                if (resolved && loserMap[resolved]) return loserMap[resolved];
            }
            return name;
        }

        allMatches.forEach(m => {
            m.team1 = resolve(m.team1);
            m.team2 = resolve(m.team2);
        });

        const container = document.getElementById("bracket-container");
        container.innerHTML = "";

        const colKeys = Object.keys(columns).map(Number).sort((a, b) => a - b);

        colKeys.forEach(colNum => {
            const col = document.createElement("div");
            col.className = "column";

            const title = document.createElement("div");
            title.className = "column-title";
            title.innerText = COLUMN_TITLES[colNum] || `Round ${colNum}`;
            col.appendChild(title);

            columns[colNum].forEach(match => {
                const matchDiv = document.createElement("div");
                matchDiv.className = "match";

                const winnerTrim = match.winner.trim();
                const t1 = match.team1;
                const t2 = match.team2;
                const team1Class = winnerTrim && winnerTrim === t1 ? 'winner' : (winnerTrim ? 'loser' : '');
                const team2Class = winnerTrim && winnerTrim === t2 ? 'winner' : (winnerTrim ? 'loser' : '');

                matchDiv.innerHTML = `
                    <div class="round-title">${match.round}</div>
                    <div class="team ${team1Class}">${t1}</div>
                    <div class="vs">VS</div>
                    <div class="team ${team2Class}">${t2}</div>
                `;
                col.appendChild(matchDiv);
            });

            container.appendChild(col);
        });

    } catch (err) {
        console.error("Failed to load bracket data:", err);
    }
}

setInterval(updateBracket, 500);
updateBracket();
</script>

</body>
</html>
